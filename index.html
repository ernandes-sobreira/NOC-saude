<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOC Clínica</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:#111820;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.box{background:#fff;border-radius:16px;width:400px;max-width:96vw;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.topo{background:#111820;padding:18px 22px;display:flex;align-items:center;gap:10px;}
.marca{font-size:22px;color:#6de090;letter-spacing:5px;font-weight:700;font-family:Georgia,serif;}
.abas{display:flex;border-bottom:2px solid #eee;}
.aba{flex:1;padding:12px 6px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;color:#aaa;border-bottom:3px solid transparent;margin-bottom:-2px;user-select:none;}
.aba.on{color:#1a7a40;border-bottom-color:#1a7a40;}
.painel{padding:20px 22px;display:none;}
.painel.on{display:block;}
.msg{padding:10px 13px;border-radius:7px;font-size:13px;font-weight:600;margin-bottom:13px;display:none;}
.msg.ok{background:#e8f5ed;color:#1a5230;border:1px solid #2e8a48;}
.msg.err{background:#fff0f0;color:#880000;border:1px solid #cc2222;}
lbl{font-size:9px;font-weight:700;color:#aaa;letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:4px;}
inp{width:100%;padding:10px 12px;border:1.5px solid #ccc;border-radius:7px;font-size:14px;outline:none;margin-bottom:11px;font-family:sans-serif;display:block;}
inp:focus{border-color:#1a7a40;}
.btn{width:100%;padding:12px;border-radius:7px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:sans-serif;margin-bottom:7px;}
.btn-escuro{background:#111820;color:#fff;}
.btn-verde{background:#1a7a40;color:#fff;}
.btn-vermelho{background:#980000;color:#fff;}
.papeis{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:13px;}
.papel{padding:11px;border-radius:7px;border:2px solid #ddd;background:#f9f9f9;cursor:pointer;text-align:center;font-size:12px;font-weight:700;}
.papel.on{border-color:#1a7a40;background:#e8f5ed;}
#app{display:none;position:fixed;inset:0;background:#f6f4f1;overflow-y:auto;padding:20px;}
.app-top{background:#111820;color:#fff;padding:13px 18px;border-radius:10px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 2px 10px rgba(0,0,0,.07);margin-bottom:12px;}
</style>
</head>
<body>

<div class="box" id="loginBox">
  <div class="topo">
    <svg width="26" height="26" viewBox="0 0 48 48" fill="none">
      <circle cx="24" cy="24" r="22" stroke="#3a9a60" stroke-width="1.5" fill="rgba(58,154,96,.1)"/>
      <path d="M17 34C17 24 20.5 14 24 12c3.5 2 7 12 7 22" stroke="#6de090" stroke-width="2" fill="none" stroke-linecap="round"/>
    </svg>
    <div class="marca">NOC</div>
    <span style="font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.3);text-transform:uppercase;margin-left:4px;">sistema clínico</span>
  </div>

  <div class="abas">
    <div class="aba on" id="aba-entrar"  onclick="irAba('entrar')">Entrar</div>
    <div class="aba"    id="aba-criar"   onclick="irAba('criar')">Criar Conta</div>
    <div class="aba"    id="aba-admin"   onclick="irAba('admin')">🔑 Admin</div>
  </div>

  <!-- ENTRAR -->
  <div class="painel on" id="p-entrar">
    <div class="msg" id="m-entrar"></div>
    <lbl>E-MAIL</lbl>
    <input class="inp" id="e-email" type="email" placeholder="seu@email.com">
    <lbl>SENHA</lbl>
    <input class="inp" id="e-senha" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')entrar()">
    <button class="btn btn-escuro" onclick="entrar()">Entrar no Sistema</button>
  </div>

  <!-- CRIAR CONTA -->
  <div class="painel" id="p-criar">
    <div class="msg" id="m-criar"></div>
    <div class="papeis">
      <div class="papel on" id="r-pac" onclick="setPapel('paciente')">
        <div style="font-size:22px;margin-bottom:4px">🧑‍⚕️</div>Paciente
      </div>
      <div class="papel" id="r-med" onclick="setPapel('medico')">
        <div style="font-size:22px;margin-bottom:4px">👨‍⚕️</div>Médico
      </div>
    </div>
    <lbl>NOME COMPLETO</lbl>
    <input class="inp" id="c-nome" placeholder="Seu nome completo">
    <div id="f-med" style="display:none">
      <lbl>ESPECIALIDADE</lbl>
      <select class="inp" id="c-esp" style="cursor:pointer">
        <option value="endo">Endocrinologia</option>
        <option value="derm">Dermatologia</option>
        <option value="ambas">Endo + Derm</option>
      </select>
      <lbl>CLÍNICA</lbl>
      <input class="inp" id="c-clinica" value="NOC Cuiabá">
    </div>
    <lbl>E-MAIL</lbl>
    <input class="inp" id="c-email" type="email" placeholder="seu@email.com">
    <lbl>SENHA (mín. 6 caracteres)</lbl>
    <input class="inp" id="c-senha" type="password" placeholder="••••••••">
    <button class="btn btn-verde" onclick="criar()">Criar Conta</button>
  </div>

  <!-- ADMIN -->
  <div class="painel" id="p-admin">
    <div class="msg" id="m-admin"></div>
    <lbl>E-MAIL ADMIN</lbl>
    <input class="inp" id="a-email" type="email" placeholder="admin@noc.com.br">
    <lbl>SENHA</lbl>
    <input class="inp" id="a-senha" type="password" placeholder="••••••••">
    <lbl>CÓDIGO ADMIN</lbl>
    <input class="inp" id="a-code" type="password" placeholder="NOC@admin2025">
    <button class="btn btn-escuro" onclick="adminEntrar()">Entrar como Admin</button>
    <button class="btn btn-vermelho" onclick="adminCriar()">Criar conta Admin</button>
    <p style="font-size:11px;color:#aaa;text-align:center;margin-top:6px">Código: NOC@admin2025</p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="app-top">
    <span style="font-family:Georgia,serif;font-size:18px;color:#6de090;letter-spacing:3px;">NOC</span>
    <div style="display:flex;align-items:center;gap:10px;">
      <span id="app-nome" style="font-size:12px;color:rgba(255,255,255,.7)"></span>
      <button onclick="sair()" style="padding:5px 11px;border-radius:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:11px;cursor:pointer;font-family:sans-serif;">Sair</button>
    </div>
  </div>
  <div id="app-corpo"></div>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyCSTBNmzHJE-vIw6jEjlOVE_9femj5n3k8",
  authDomain:"sopa-fd8b8.firebaseapp.com",
  projectId:"sopa-fd8b8",
  storageBucket:"sopa-fd8b8.firebasestorage.app",
  messagingSenderId:"962393498465",
  appId:"1:962393498465:web:fc2023af290ce9b6a31b20"
});
var FA=firebase.auth(), FD=firebase.firestore();

function fdoc(path,id){
  var p=path.split('/'),r=FD;
  for(var i=0;i<p.length;i++) r=i%2===0?r.collection(p[i]):r.doc(p[i]);
  return id?r.doc(id):r;
}

function setMsg(id,txt,tipo){
  var e=document.getElementById('m-'+id);
  if(!e)return;
  e.textContent=txt;
  e.className='msg '+(tipo||'ok');
  e.style.display='block';
}
function clearMsg(id){ var e=document.getElementById('m-'+id); if(e)e.style.display='none'; }

function irAba(t){
  ['entrar','criar','admin'].forEach(function(x){
    document.getElementById('aba-'+x).className='aba'+(x===t?' on':'');
    document.getElementById('p-'+x).className='painel'+(x===t?' on':'');
    clearMsg(x);
  });
}

var _papel='paciente';
function setPapel(r){
  _papel=r;
  document.getElementById('r-pac').className='papel'+(r==='paciente'?' on':'');
  document.getElementById('r-med').className='papel'+(r==='medico'?' on':'');
  document.getElementById('f-med').style.display=r==='medico'?'block':'none';
}

function gv(id){ var e=document.getElementById(id); return e?(e.value||'')'':'';}

async function entrar(){
  clearMsg('entrar');
  var em=gv('e-email').trim(), ps=gv('e-senha');
  if(!em||!ps){setMsg('entrar','Preencha e-mail e senha.','err');return;}
  setMsg('entrar','Entrando...','ok');
  try{ await FA.signInWithEmailAndPassword(em,ps); }
  catch(e){ setMsg('entrar',e.code==='auth/invalid-credential'||e.code==='auth/user-not-found'||e.code==='auth/wrong-password'?'E-mail ou senha incorretos.':e.message,'err'); }
}

async function criar(){
  clearMsg('criar');
  var nm=gv('c-nome').trim(),em=gv('c-email').trim(),ps=gv('c-senha');
  if(!nm){setMsg('criar','Digite seu nome.','err');return;}
  if(!em){setMsg('criar','Digite seu e-mail.','err');return;}
  if(ps.length<6){setMsg('criar','Senha precisa ter pelo menos 6 caracteres.','err');return;}
  setMsg('criar','Criando conta...','ok');
  try{
    var cr=await FA.createUserWithEmailAndPassword(em,ps);
    var uid=cr.user.uid;
    var p={nome:nm,tipo:_papel,email:em};
    if(_papel==='medico'){
      p.especialidade=gv('c-esp');
      p.clinica=gv('c-clinica').trim();
      await fdoc('adminIndex',uid).set({tipo:'medico',email:em,nome:nm});
    }
    await fdoc('users/'+uid+'/perfil','dados').set(p);
    setMsg('criar','Conta criada! Carregando...','ok');
  }catch(e){
    var m=e.message;
    if(e.code==='auth/email-already-in-use') m='E-mail já cadastrado. Use "Entrar".';
    if(e.code==='auth/weak-password') m='Senha muito fraca.';
    setMsg('criar',m,'err');
  }
}

async function adminEntrar(){
  clearMsg('admin');
  var em=gv('a-email').trim(),ps=gv('a-senha'),code=gv('a-code');
  if(code!=='NOC@admin2025'){setMsg('admin','Código incorreto.','err');return;}
  if(!em||!ps){setMsg('admin','Preencha e-mail e senha.','err');return;}
  setMsg('admin','Entrando...','ok');
  try{ await FA.signInWithEmailAndPassword(em,ps); }
  catch(e){ setMsg('admin',e.code==='auth/invalid-credential'||e.code==='auth/user-not-found'?'E-mail ou senha incorretos.':e.message,'err'); }
}

async function adminCriar(){
  clearMsg('admin');
  var em=gv('a-email').trim(),ps=gv('a-senha'),code=gv('a-code');
  if(code!=='NOC@admin2025'){setMsg('admin','Código: NOC@admin2025','err');return;}
  if(!em){setMsg('admin','Digite o e-mail.','err');return;}
  if(ps.length<6){setMsg('admin','Senha mínimo 6 caracteres.','err');return;}
  setMsg('admin','Criando conta admin...','ok');
  try{
    var cr=await FA.createUserWithEmailAndPassword(em,ps);
    var uid=cr.user.uid;
    await fdoc('users/'+uid+'/perfil','dados').set({nome:'Admin NOC',tipo:'admin',email:em});
    await fdoc('adminIndex',uid).set({tipo:'admin',email:em,nome:'Admin NOC'});
    setMsg('admin','Conta admin criada! Entrando...','ok');
  }catch(e){
    var m=e.message;
    if(e.code==='auth/email-already-in-use') m='Já existe esta conta. Use "Entrar como Admin".';
    setMsg('admin',m,'err');
  }
}

function sair(){ FA.signOut(); }

FA.onAuthStateChanged(async function(user){
  if(!user){
    document.getElementById('loginBox').style.display='block';
    document.getElementById('app').style.display='none';
    return;
  }
  document.getElementById('loginBox').style.display='none';
  document.getElementById('app').style.display='block';
  try{
    var s=await fdoc('users/'+user.uid+'/perfil','dados').get();
    var pf=s.exists?s.data():{nome:user.email,tipo:'medico'};
    document.getElementById('app-nome').textContent=pf.nome+' · '+(pf.tipo||'medico');
    var tipo=pf.tipo||'medico';
    var cor=tipo==='admin'?'#980000':tipo==='medico'?'#154fa0':'#1a7a40';
    var ico=tipo==='admin'?'🔑':tipo==='medico'?'🩺':'🧑‍⚕️';
    document.getElementById('app-corpo').innerHTML=
      '<div class="card"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">'+
      '<span style="font-size:28px;">'+ico+'</span>'+
      '<div><div style="font-size:16px;font-weight:700;">Bem-vindo, '+pf.nome+'!</div>'+
      '<span style="font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700;background:'+cor+'20;color:'+cor+';border:1px solid '+cor+'40;">'+tipo.toUpperCase()+'</span></div></div>'+
      '<p style="color:#666;font-size:13px;line-height:1.6;">Login funcionando corretamente. Firebase conectado. Em breve o painel completo.</p></div>';
  }catch(e){
    document.getElementById('app-corpo').innerHTML='<div class="card"><p style="color:red">Erro: '+e.message+'</p></div>';
  }
});
</script>
</body>
</html>
